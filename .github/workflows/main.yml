name: Weekly Extract

on:
  push:
    branches: ["main"]
    paths: ["tn_gazette_archiver.py", "scrape_gazettes.py", "archive_new_links.py", ".github/workflows/main.yml"]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Run every Sunday at midnight UTC

permissions:
  contents: write

jobs:
  run:
    name: Scrape & Archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape new Extraordinary Gazettes
        run: python scrape_gazettes.py

      - name: Archive unarchived PDF links to Wayback Machine
        run: python archive_new_links.py --delay 2

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Weekly scrape and Wayback archival"
          git push
